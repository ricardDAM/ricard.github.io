<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Ricard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    /* LIGHT MODE */
    body.light {
      background: #f5f5f5;
      color: #111111;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #000000;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 2px solid #ff6a00;
    }

    body.light nav {
      background: #ffffff;
      border-bottom: 2px solid #ff6a00;
    }

    nav a {
      color: #ff6a00;
      margin-left: 20px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .toggle-btn {
      background: #ff6a00;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 20px;
    }

    header {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      border-bottom: 2px solid #ff6a00;
    }

    body.light header {
      background: linear-gradient(135deg, #ffffff, #e5e5e5);
    }

    header h1 { font-size: 3rem; color: #ff6a00; }
    header p { opacity: 0.85; margin-top: 10px; color: #38bdf8; }

    section {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      border-bottom: 2px solid #ff6a00;
      margin-bottom: 30px;
      padding-bottom: 10px;
      color: #ff6a00;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111111;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: transform 0.3s, box-shadow 0.3s, opacity 0.6s ease;
      opacity: 0;
      transform: translateY(40px);
    }

    body.light .card {
      background: #ffffff;
      border: 1px solid #ddd;
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .skills span {
      display: inline-block;
      background: #ff6a00;
      color: black;
      padding: 6px 10px;
      margin: 5px;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .accenture-logo {
      width: 120px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #000000;
      font-size: 0.8rem;
      margin-top: 40px;
      border-top: 2px solid #ff6a00;
    }

    body.light footer {
      background: #ffffff;
    }
  </style>
</head>
<body>

<nav>
  <h3 style="color:#ff6a00;">Ricard</h3>
  <div>
    <a href="#about">Sobre mi</a>
    <a href="#experience">Experiència</a>
    <a href="#skills">Habilitats</a>
    <a href="#projects">Projectes</a>
    <a href="#contact">Contacte</a>
    <button class="toggle-btn" onclick="canviarTema()">tema</button>
  </div>
</nav>

<header>
  <h1 id="typing"></h1>
  <p>Frontend Developer | AEM | Web Developer</p>
</header>

<section id="about">
  <h2>Perfil</h2>
  <div class="card">
    <p>Sóc una persona treballadora, pacient i enfocada en oferir resultats òptims...</p>
  </div>
</section>

<section id="experience">
  <h2>Experiència</h2>
  <div class="grid">
    <div class="card">
      <h3>Accenture</h3>
      <img class="accenture-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Accenture.svg">
      <p>Pràctiques Frontend (2025 - Actualment)</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 Ricard Ribas Herrera | Portfolio</p>
</footer>

<script>
  function canviarTema() {
    document.body.classList.toggle('light');
  }

  const text = "Ricard Ribas Herrera";
  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 80);
    }
  }
  typing();

 
</script>

</body>
</html>
